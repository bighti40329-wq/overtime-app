rgba(15,23,42,.08)}.types{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.type{border:1px solid #e2e8f0;border-radius:18px;background:white;padding:12px;text-align:left;font-weight:950}.type.active{background:linear-gradient(135deg,#2563eb,#0ea5e9);color:white;border-color:#3b82f6}.stepper{display:flex;justify-content:center;align-items:center;gap:14px;margin:14px 0}.circle{width:56px;height:56px;border-radius:50%;background:#2563eb;color:white;font-size:28px;font-weight:950}.hbadge{min-width:110px;text-align:center;font-size:30px;font-weight:950;color:#1d4ed8;background:#eff6ff;border-radius:22px;padding:12px}input[type=range]{width:100%;accent-color:#2563eb}.field{display:grid;gap:6px;margin-top:12px}.field label{font-size:13px;color:#64748b;font-weight:950}.result{margin-top:14px;border-radius:24px;background:linear-gradient(135deg,#020617,#111827,#172554);color:white;padding:18px}.money{font-size:36px;font-weight:950;line-height:1;margin-top:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.break{display:grid;gap:7px;margin-top:12px;font-size:13px;color:#dbeafe}.break div{display:flex;justify-content:space-between;gap:10px;border-top:1px solid rgba(255,255,255,.12);padding-top:7px}.note,.warn{margin-top:12px;border-radius:16px;padding:10px;font-size:13px;font-weight:850;line-height:1.45}.note{background:#f8fafc;color:#64748b}.warn{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.actions3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}.record{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;border:1px solid #f1f5f9;border-radius:18px;background:#fff;padding:12px;margin-top:8px}.record b,.record p{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.record p{margin:3px 0 0;color:#64748b;font-size:13px;font-weight:800}.recordLeft{min-width:0}.miniDel{margin-top:6px;border-radius:11px;background:#fff1f2;color:#e11d48;padding:6px 9px;font-weight:950}.nav{position:fixed;left:50%;bottom:calc(10px + env(safe-area-inset-bottom));transform:translateX(-50%);width:min(92vw,420px);display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;background:rgba(255,255,255,.94);box-shadow:0 18px 40px rgba(148,163,184,.55);border-radius:22px;padding:6px;z-index:10}.nav a{text-align:center;text-decoration:none;border-radius:16px;padding:10px;font-size:13px;font-weight:950;color:#475569}.nav a.active{background:#2563eb;color:white}.toast{position:fixed;left:50%;bottom:calc(76px + env(safe-area-inset-bottom));transform:translateX(-50%);background:#020617;color:white;border-radius:99px;padding:12px 16px;font-weight:950;opacity:0;transition:.2s;z-index:20;max-width:92vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toast.show{opacity:1}.hiddenFile{display:none}@media(max-width:380px){.big,.money{font-size:31px}.salaryRow{grid-template-columns:1fr .78fr 52px 36px}.planRow{grid-template-columns:62px 1fr 72px 36px}.heroStat{padding:8px 6px}.actions3{grid-template-columns:1fr 1fr}}
</style></head><body><main class="app">
<section class="hero"><div class="heroTop"><div><small>月份總覽</small><h1>加班費精算</h1></div><div class="icon">💳</div></div><div class="monthRow"><button onclick="prevMonth()">‹</button><input id="month" type="month"><button onclick="nextMonth()">›</button></div><div class="label">當月累計加班費</div><div id="heroPay" class="big">NT$0</div><div class="heroStats"><div class="heroStat"><span>累計時數</span><b id="heroHours">0.0h</b></div><div class="heroStat"><span>距 46h</span><b id="heroRemain">46.0h</b></div><div class="heroStat"><span>平均單次</span><b id="heroAvg">NT$0</b></div></div><div class="barHead"><span>工時提醒進度</span><span id="progressText">0%</span></div><div class="bar"><div id="progressBar"></div></div></section>
<section class="card" id="salary"><div class="title"><div class="titleLeft">💼 薪資結構</div><button class="chip" id="salaryToggle" onclick="toggleSalary()">設定⌄</button></div><div id="salaryList" style="display:none"></div><button id="addSalaryBtn" class="btn blue" style="display:none;margin-top:10px" onclick="addSalary()">＋ 新增薪資名目</button><div class="stats"><div class="stat"><small>薪資名目總額</small><b id="salaryTotal">NT$0</b></div><div class="stat"><small>加班基數時薪</small><b id="hourlyRate">NT$0</b></div></div></section>
<section class="card" id="calc"><div class="title"><div class="titleLeft">💳 加班費計算器</div><span class="chip" id="modePill">單日試算</span></div><div class="tabs"><button id="singleTab" onclick="setMode('single')">單日試算</button><button id="batchTab" onclick="setMode('batch')">多日批次</button></div><div id="singlePanel"><div class="types" id="types"></div><div style="margin-top:16px;color:#64748b;font-weight:950">加班時數</div><div class="stepper"><button class="circle" onclick="changeHours(-.5)">−</button><div id="hoursText" class="hbadge">2.0h</div><button class="circle" onclick="changeHours(.5)">+</button></div><input id="hoursRange" type="range" min="0.5" max="12" step="0.5" oninput="setHours(this.value)"><div class="field"><label>加班日期</label><input id="workDate" type="date"></div><div class="field"><label>備註</label><textarea id="memo" placeholder="例如：專案上線、盤點、會議支援"></textarea></div><div class="result"><div>本次估算加班費 <span id="rateBadge" style="float:right;font-size:12px;opacity:.75">時薪 NT$0</span></div><div id="resultMoney" class="money">NT$0</div><div id="breakdown" class="break"></div></div><div id="warning" class="warn" style="display:none"></div><div class="actions"><button class="btn green" onclick="saveSingle()">儲存至歷史</button><button class="btn gray" onclick="copyResult()">複製結果</button></div><div id="ruleNote" class="note"></div></div><div id="batchPanel" style="display:none"><label class="note" style="display:flex;gap:8px;align-items:center"><input id="restBlock" type="checkbox" style="width:auto" onchange="state.restBlock=this.checked;renderCalc()">休息日套用 4 / 8 / 12 小時計薪區塊</label><div id="planner"></div><div class="actions"><button class="btn blue" onclick="addPlan()">＋ 新增一天</button><button class="btn green" onclick="saveBatch()">批次存入歷史</button></div><div class="result"><div>本月批次預估總額</div><div id="plannedPay" class="money">NT$0</div><div style="margin-top:8px;color:rgba(255,255,255,.8);font-weight:900">總時數：<b id="plannedHours">0.0h</b></div></div></div></section>
<section class="card" id="history"><div class="title"><div class="titleLeft">📒 加班歷史</div><button class="btn red" style="width:auto;padding:8px 12px;font-size:14px" onclick="clearMonth()">清空本月</button></div><div class="stats"><div class="stat"><small>當月累計時數</small><b id="monthHours">0.0h</b></div><div class="stat"><small>當月累計加班費</small><b id="monthPay">NT$0</b></div></div><div class="actions3"><button class="btn gray" onclick="exportCsv()">匯出 CSV</button><button class="btn gray" onclick="backupJson()">備份 JSON</button><button class="btn blue" onclick="openImport()">匯入 JSON</button></div><input id="importJson" class="hiddenFile" type="file" accept="application/json,.json" onchange="importJsonFile(this.files)"><div id="records"></div></section></main><nav class="nav"><a href="#salary">薪資</a><a href="#calc" class="active">試算</a><a href="#history">歷史</a></nav><div id="toast" class="toast"></div>
<script>
var TYPES=[{id:'weekday',name:'平日',emoji:'⏱️',note:'平日延長工時：前 2 小時 4/3，第 3～4 小時 5/3；超過 4 小時僅供估算。'},{id:'rest',name:'休息日',emoji:'☕',note:'休息日出勤：前 2 小時 4/3，第 3～8 小時 5/3，第 9～12 小時 8/3。'},{id:'holiday',name:'國定/特休',emoji:'📅',note:'8 小時內額外加發一日工資；超過 8 小時部分按平日延長工時估算。'},{id:'regular',name:'例假日',emoji:'⚠️',note:'例假日原則不得出勤；特殊情形出勤需留意補假與工資。'}];
function $(id){return document.getElementById(id)}function pad2(n){return String(n).padStart(2,'0')}function today(){var d=new Date();return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())}function money(n){return 'NT$'+Math.round(Number(n)||0).toLocaleString('zh-TW')}function cleanNum(v){return String(v||'').replace(/[^0-9.]/g,'')}function cleanDay(v){return String(v||'').replace(/[^0-9]/g,'')}function clamp(h){return Math.min(12,Math.max(.5,Math.round((Number(cleanNum(h))||.5)*2)/2))}function calcHours(h){return cleanNum(h)===''?0:clamp(h)}function uid(){return String(Date.now())+String(Math.random()).slice(2)}function esc(s){return String(s==null?'':s).replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]})}
var KEY='ot-pwa-url-v3-jsonimport-icon';var state={month:today().slice(0,7),mode:'single',type:'weekday',hours:2,restBlock:false,salaryOpen:false,salaryItems:[],records:[],planner:[{id:'p1',day:1,type:'weekday',hours:2}]};try{var raw=localStorage.getItem(KEY)||localStorage.getItem('ot-pwa-url-v2-focusfix')||localStorage.getItem('ot-pwa-url-v1')||'{}';var s=JSON.parse(raw);for(var k in s)state[k]=s[k];if(!state.salaryItems)state.salaryItems=[];if(!state.records)state.records=[];if(!state.planner||!state.planner.length)state.planner=[{id:'p1',day:1,type:'weekday',hours:2}]}catch(e){}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){}}var timer;function show(m){$('toast').textContent=m;$('toast').classList.add('show');clearTimeout(timer);timer=setTimeout(function(){$('toast').classList.remove('show')},1800)}function validDate(s){if(!/^\d{4}-\d{2}-\d{2}$/.test(s))return false;var a=s.split('-').map(Number),d=new Date(a[0],a[1]-1,a[2]);return d.getFullYear()==a[0]&&d.getMonth()==a[1]-1&&d.getDate()==a[2]}function addMonths(ym,n){var a=ym.split('-').map(Number),y=a[0],m=a[1]+n;while(m<1){m+=12;y--}while(m>12){m-=12;y++}return y+'-'+pad2(m)}
function salaryBase(){return state.salaryItems.filter(function(i){return i.included!==false}).reduce(function(s,i){return s+Number(cleanNum(i.value)||0)},0)}function salaryAll(){return state.salaryItems.reduce(function(s,i){return s+Number(cleanNum(i.value)||0)},0)}function hourly(){return salaryBase()/240}function addLine(lines,label,h,mul,rate){if(h<=0)return 0;var amt=h*mul*rate;lines.push({label:label,h:h,mul:mul,amt:amt});return amt}function restBill(h){if(!state.restBlock)return h;if(h<=4)return 4;if(h<=8)return 8;return 12}function calc(type,hours,restBlock){var h=calcHours(hours),rate=hourly(),lines=[],total=0,bill=type==='rest'?(restBlock?restBill(h):h):h;if(type==='weekday'){total+=addLine(lines,'前 2 小時',Math.min(h,2),4/3,rate);total+=addLine(lines,'第 3～4 小時',Math.min(Math.max(h-2,0),2),5/3,rate);total+=addLine(lines,'超過 4 小時估算',Math.max(h-4,0),5/3,rate)}if(type==='rest'){if(restBlock&&bill!==h)lines.push({label:'休息日區塊計薪：實際 '+h+'h，以 '+bill+'h 計',h:0,mul:0,amt:0});total+=addLine(lines,'前 2 小時',Math.min(bill,2),4/3,rate);total+=addLine(lines,'第 3～8 小時',Math.min(Math.max(bill-2,0),6),5/3,rate);total+=addLine(lines,'第 9～12 小時',Math.max(bill-8,0),8/3,rate)}if(type==='holiday'){if(h>0)total+=addLine(lines,'8 小時內額外加發一日工資',8,1,rate);total+=addLine(lines,'超過 8 小時：前 2 小時',Math.min(Math.max(h-8,0),2),4/3,rate);total+=addLine(lines,'超過 10 小時：再延長',Math.max(h-10,0),5/3,rate)}if(type==='regular'){if(h>0)total+=addLine(lines,'8 小時內額外加發一日工資',8,1,rate);total+=addLine(lines,'超過 8 小時部分',Math.max(h-8,0),2,rate)}return{total:total,lines:lines,rate:rate}}
function monthRecords(){return state.records.filter(function(r){return r.date&&r.date.slice(0,7)===state.month})}function renderSummary(){var rs=monthRecords(),h=rs.reduce(function(s,r){return s+Number(r.hours||0)},0),p=rs.reduce(function(s,r){return s+Number(r.amount||0)},0),avg=rs.length?p/rs.length:0,pct=Math.min(100,h/46*100);$('month').value=state.month;$('heroPay').textContent=money(p);$('heroHours').textContent=h.toFixed(1)+'h';$('heroRemain').textContent=Math.max(0,46-h).toFixed(1)+'h';$('heroAvg').textContent=money(avg);$('progressText').textContent=pct.toFixed(0)+'%';$('progressBar').style.width=pct+'%';$('progressBar').style.background=h>=46?'#e11d48':h>=32?'#f59e0b':'#3b82f6';$('monthHours').textContent=h.toFixed(1)+'h';$('monthPay').textContent=money(p)}function updateSalaryTotals(){$('salaryTotal').textContent=money(salaryAll());$('hourlyRate').textContent=money(hourly());renderCalc(false);persist()}
function renderSalary(){var open=state.salaryOpen;$('salaryList').style.display=open?'grid':'none';$('addSalaryBtn').style.display=open?'block':'none';$('salaryToggle').textContent=open?'收合⌃':'設定⌄';$('salaryList').innerHTML=state.salaryItems.length?state.salaryItems.map(function(i,idx){return '<div class="salaryRow"><input value="'+esc(i.name)+'" oninput="salaryName('+idx+',this.value)" placeholder="項目"><input data-kind="money" type="text" inputmode="decimal" value="'+esc(i.value)+'" oninput="salaryValue('+idx+',this.value)"><button class="base '+(i.included!==false?'':'off')+'" onclick="toggleBase('+idx+')">基數</button><button class="del" onclick="delSalary('+idx+')">×</button></div>'}).join(''):'<div class="note">尚未建立薪資項目，請按「新增薪資名目」。</div>';updateSalaryTotals()}function renderTypes(){$('types').innerHTML=TYPES.map(function(t){return '<button class="type '+(state.type===t.id?'active':'')+'" onclick="setType(\''+t.id+'\')">'+t.emoji+' '+t.name+'</button>'}).join('')}function renderCalc(updatePlan){if(updatePlan!==false)updatePlan=true;state.hours=clamp(state.hours);$('hoursRange').value=state.hours;$('hoursText').textContent=state.hours.toFixed(1)+'h';var c=calc(state.type,state.hours,false);$('rateBadge').textContent='時薪 '+money(c.rate);$('resultMoney').textContent=money(c.total);$('breakdown').innerHTML=c.lines.map(function(l){return '<div><span>'+l.label+(l.h?'｜'+l.h+'h × '+l.mul.toFixed(2):'')+'</span><b>'+(l.amt?money(l.amt):'')+'</b></div>'}).join('');var t=TYPES.filter(function(x){return x.id===state.type})[0];$('ruleNote').textContent=t?t.note:'';var w=salaryBase()<=0?'請先在「薪資結構」新增並勾選至少一個薪資基數項目。':'';$('warning').style.display=w?'block':'none';$('warning').textContent=w;if(updatePlan)renderPlanTotal();persist()}function renderPlanner(){if(!state.planner.length)state.planner=[{id:uid(),day:1,type:'weekday',hours:2}];$('planner').innerHTML=state.planner.map(function(r,idx){return '<div class="planRow"><input type="text" inputmode="numeric" value="'+esc(r.day)+'" oninput="planDay('+idx+',this.value)" onblur="normPlanDay('+idx+',this)"><select onchange="planType('+idx+',this.value)">'+TYPES.map(function(t){return '<option value="'+t.id+'" '+(t.id===r.type?'selected':'')+'>'+t.name+'</option>'}).join('')+'</select><input type="text" inputmode="decimal" value="'+esc(r.hours)+'" oninput="planHours('+idx+',this.value)" onblur="normPlanHours('+idx+',this)"><button class="del" onclick="delPlan('+idx+')">×</button></div>'}).join('');renderPlanTotal()}function renderPlanTotal(){var h=0,p=0;state.planner.forEach(function(r){var c=calc(r.type,r.hours,state.restBlock);h+=calcHours(r.hours);p+=c.total});$('plannedHours').textContent=h.toFixed(1)+'h';$('plannedPay').textContent=money(p);persist()}function renderHistory(){var rs=monthRecords().sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0)});$('records').innerHTML=rs.length?rs.map(function(r){var t=TYPES.filter(function(x){return x.id===r.type})[0];return '<div class="record"><div class="recordLeft"><b>'+r.date+'｜'+(t?t.name:r.type)+'</b><p>'+Number(r.hours).toFixed(1)+' 小時｜時薪 '+money(r.rate)+(r.memo?'｜'+esc(r.memo):'')+'</p><button class="miniDel" onclick="delRecord(\''+r.id+'\')">刪除</button></div><div style="font-weight:950">'+money(r.amount)+'</div></div>'}).join(''):'<div class="note">此月份尚無紀錄。</div>'}function render(){renderSalary();renderTypes();renderCalc();renderPlanner();renderHistory();renderSummary();$('modePill').textContent=state.mode==='single'?'單日試算':'多日批次';$('singlePanel').style.display=state.mode==='single'?'block':'none';$('batchPanel').style.display=state.mode==='batch'?'block':'none';$('singleTab').className=state.mode==='single'?'active':'';$('batchTab').className=state.mode==='batch'?'active':'';$('restBlock').checked=!!state.restBlock;persist()}
function toggleSalary(){state.salaryOpen=!state.salaryOpen;renderSalary();persist()}function addSalary(){state.salaryItems.push({name:'薪資項目',value:'',included:true});state.salaryOpen=true;renderSalary()}function salaryName(i,v){state.salaryItems[i].name=v;persist()}function salaryValue(i,v){state.salaryItems[i].value=cleanNum(v);updateSalaryTotals()}function toggleBase(i){state.salaryItems[i].included=state.salaryItems[i].included===false;renderSalary();renderCalc()}function delSalary(i){state.salaryItems.splice(i,1);renderSalary();renderCalc()}function setMode(m){state.mode=m;render()}function setType(t){state.type=t;renderTypes();renderCalc()}function changeHours(v){state.hours=clamp(state.hours+v);renderCalc()}function setHours(v){state.hours=clamp(v);renderCalc()}function planDay(i,v){state.planner[i].day=cleanDay(v);renderPlanTotal()}function normPlanDay(i,el){var n=Math.min(31,Math.max(1,Number(state.planner[i].day)||1));state.planner[i].day=n;el.value=n;renderPlanTotal()}function planType(i,v){state.planner[i].type=v;renderPlanTotal()}function planHours(i,v){state.planner[i].hours=cleanNum(v);renderPlanTotal()}function normPlanHours(i,el){var n=clamp(state.planner[i].hours);state.planner[i].hours=n;el.value=n;renderPlanTotal()}function addPlan(){var last=state.planner[state.planner.length-1]||{day:0};state.planner.push({id:uid(),day:Math.min(31,(Number(last.day)||0)+1),type:'weekday',hours:2});renderPlanner()}function delPlan(i){state.planner.splice(i,1);renderPlanner()}function prevMonth(){state.month=addMonths(state.month,-1);renderSummary();renderHistory();persist()}function nextMonth(){state.month=addMonths(state.month,1);renderSummary();renderHistory();persist()}
function saveSingle(){if(salaryBase()<=0){state.salaryOpen=true;show('請先輸入薪資基數');renderSalary();return}var date=$('workDate').value||today();if(!validDate(date)){show('日期無效');return}var c=calc(state.type,state.hours,false);state.records.push({id:uid(),date:date,type:state.type,hours:state.hours,amount:Math.round(c.total),rate:Math.round(c.rate),memo:$('memo').value.trim(),createdAt:Date.now()});state.month=date.slice(0,7);$('memo').value='';show('已儲存');renderSummary();renderHistory();persist()}function saveBatch(){if(salaryBase()<=0){state.salaryOpen=true;show('請先輸入薪資基數');renderSalary();return}var count=0,skip=0;state.planner.forEach(function(r,idx){var day=Number(r.day),date=state.month+'-'+pad2(day);if(!Number.isInteger(day)||!validDate(date)){skip++;return}var c=calc(r.type,r.hours,state.restBlock);state.records.push({id:uid(),date:date,type:r.type,hours:calcHours(r.hours),amount:Math.round(c.total),rate:Math.round(c.rate),memo:'月計算批次匯入',createdAt:Date.now()+idx});count++});show('已匯入 '+count+' 筆'+(skip?'，略過 '+skip+' 筆無效日期':''));renderSummary();renderHistory();persist()}function delRecord(id){state.records=state.records.filter(function(r){return r.id!==id});renderSummary();renderHistory();persist()}function clearMonth(){state.records=state.records.filter(function(r){return r.date.slice(0,7)!==state.month});show('已清空本月');renderSummary();renderHistory();persist()}function copyResult(){var c=calc(state.type,state.hours,false);var t=TYPES.filter(function(x){return x.id===state.type})[0];var text=($('workDate').value||today())+'｜'+(t?t.name:'')+'｜'+state.hours.toFixed(1)+'h｜'+money(c.total);if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){show('已複製')}).catch(function(){fallbackCopy(text)})}else fallbackCopy(text)}function fallbackCopy(text){var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');show('已複製')}catch(e){show('無法複製')}ta.remove()}function download(name,text,type){var blob=new Blob([text],{type:type});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(a.href)},800)}function exportCsv(){var rs=monthRecords();var csv='日期,類型,時數,時薪,加班費,備註\n'+rs.map(function(r){var t=TYPES.filter(function(x){return x.id===r.type})[0];return [r.date,t?t.name:r.type,r.hours,r.rate,r.amount,r.memo||''].map(function(v){return '"'+String(v).replace(/"/g,'""')+'"'}).join(',')}).join('\n');download('加班紀錄_'+state.month+'.csv','\ufeff'+csv,'text/csv;charset=utf-8');show('CSV 已匯出')}function backupJson(){download('加班備份_'+today()+'.json',JSON.stringify(state,null,2),'application/json');show('JSON 已備份')}function openImport(){$('importJson').value='';$('importJson').click()}function importJsonFile(files){if(!files||!files[0])return;var reader=new FileReader();reader.onload=function(){try{var data=JSON.parse(reader.result);if(!data||!Array.isArray(data.records))throw new Error('records missing');state.month=data.month||today().slice(0,7);state.mode=data.mode||'single';state.type=data.type||'weekday';state.hours=data.hours||2;state.restBlock=!!data.restBlock;state.salaryOpen=!!data.salaryOpen;state.salaryItems=Array.isArray(data.salaryItems)?data.salaryItems:[];state.records=data.records;state.planner=Array.isArray(data.planner)&&data.planner.length?data.planner:[{id:uid(),day:1,type:'weekday',hours:2}];persist();render();show('JSON 已匯入 '+state.records.length+' 筆')}catch(e){show('匯入失敗：JSON 格式不符')}};reader.readAsText(files[0])}
$('workDate').value=today();$('month').value=state.month;$('month').onchange=function(){if(this.value){state.month=this.value;renderSummary();renderHistory();persist()}};render();show('JS 已啟用');if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){})})}
</script></body></html>
